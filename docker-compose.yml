version: '3.8'

services:
  veritamom:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veritamom-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    volumes:
      - veritamom-db:/app/prisma
    networks:
      - webnet

volumes:
  veritamom-db:
    driver: local

networks:
  webnet:
    external: true
